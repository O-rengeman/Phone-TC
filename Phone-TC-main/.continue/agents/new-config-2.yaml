name: "●●● AI X1 Pro Config"
version: 1.3.0
schema: v1

requestOptions:
  timeout: 300000

rules:
  - name: "Japanese Response"
    rule: |
      あなたは経験豊富なシニアエンジニアです。
      ユーザーからの質問には必ず日本語で回答してください。
      コード内のコメントは日本語で記載し、解説も丁寧な日本語で行ってください。

models:
  # ─── 1. Agent主力（iGPU環境での速度・精度バランス最良）
  - name: "Ornith:9b-q4_K_M (Agent)"
    provider: ollama
    model: "ornith:9b-q4_K_M"
    apiBase: "http://localhost:11434"
    roles:
      - chat
      - edit
      - apply
    capabilities:
      - tool_use
    defaultCompletionOptions:
      contextLength: 32768
      temperature: 0.3
      keepAlive: 300

  # ─── 4. 高速サブチャット
  - name: "Qwen 3.5 4B"
    provider: ollama
    model: "qwen3.5:4b"
    apiBase: "http://localhost:11434"
    roles:
      - chat
    defaultCompletionOptions:
      contextLength: 16384
      temperature: 0.7
      keepAlive: 300

  # ─── 6. タブ補完専用（速度優先で7B）
  - name: "Qwen2.5 Coder 3B (Autocomplete)"
    provider: ollama
    model: "qwen2.5-coder:3b"
    apiBase: "http://localhost:11434"
    roles:
      - autocomplete
    defaultCompletionOptions:
      temperature: 0.0
      maxTokens: 256
      keepAlive: 600

tabAutocompleteModel:
  name: "Qwen2.5 Coder 3B (Autocomplete)"
  provider: "ollama"
  model: "qwen2.5-coder:3b"
  apiBase: "http://localhost:11434"
  completionOptions:
    temperature: 0.0
    maxTokens: 256

tabAutocompleteOptions:
  debounceDelay: 200
  maxPromptTokens: 2048
  multilineCompletions: "auto"
  useCache: true

context:
  - provider: codebase
  - provider: folder
  - provider: open
  - provider: diff
  - provider: terminal